name: "Feature Request"
description: "Propose a new feature or enhancement"
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: "Desired Outcome"
      description: "What should be true after this feature ships?"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem Statement"
      description: "What limitation or gap does this address?"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance Criteria"
      description: "3-7 testable criteria (required for Score phase)."
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
    validations:
      required: false

  - type: checkboxes
    id: governance
    attributes:
      label: "Governance Gates"
      options:
        - label: "Requires registry.json update"
        - label: "Introduces cross-organ dependencies"
        - label: "Changes CI/CD workflows"
        - label: "Modifies governance-rules.json"
        - label: "Requires seed.yaml update"
        - label: "Affects promotion state machine logic"

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Related issues, F-IDs from backlog, research references."
    validations:
      required: false
